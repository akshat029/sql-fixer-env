spec_version: 1
name: sql-fixer-env
type: space
runtime: fastapi
app: server.app:app
port: 7860
version: "0.1.0"
description: An OpenEnv environment for fixing broken SQL queries against a SQLite database.
author: ClonerBluff

tasks:
  - id: easy
    name: "Syntax Error Fixer"
    description: "Fix SQL queries with syntax errors (typos, missing keywords)"
    grader: server.tasks:TaskGrader
  - id: medium
    name: "Logic Error Fixer"
    description: "Fix SQL queries with logical errors (wrong conditions, wrong aggregations)"
    grader: server.tasks:TaskGrader
  - id: hard
    name: "Structural Query Rewriter"
    description: "Fix SQL queries with structural errors (wrong JOINs, subquery bugs)"
    grader: server.tasks:TaskGrader

reward_range: [0, 1]
entry_point: server.app:app